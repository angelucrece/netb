# ──────────────────────────────────────────────────────────────
# NethaStock — Analyse SonarCloud
# ──────────────────────────────────────────────────────────────
# CONFIGURATION REQUISE (Settings > Secrets and variables > Actions) :
#   SONAR_TOKEN     → token généré sur sonarcloud.io (My Account > Security)
#   TEST_DB_USERNAME → utilisateur PostgreSQL de test
#   TEST_DB_PASSWORD → mot de passe PostgreSQL de test
#   TEST_JWT_SECRET  → secret JWT pour les tests
# ──────────────────────────────────────────────────────────────
name: SonarCloud Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout complet (fetch-depth=0 requis par SonarCloud)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Installation des dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Tests + couverture
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV:    test
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     nethastock_test
          DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          JWT_SECRET:  ${{ secrets.TEST_JWT_SECRET }}

      # 5. Analyse SonarCloud
      # IMPORTANT : remplacer les deux valeurs ci-dessous par celles de votre projet SonarCloud
      #   sonar.projectKey  → visible dans SonarCloud > votre projet > Information
      #   sonar.organization → visible dans SonarCloud > Administration > Organization
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0   # version non dépréciée
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=angelucrece_netb2
            -Dsonar.organization=lucrece
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/test-connection*.js,**/test.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true