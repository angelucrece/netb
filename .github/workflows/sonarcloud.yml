# ──────────────────────────────────────────────────────────────
# NethaStock — Analyse SonarCloud
# Déclenchée sur push vers main/develop et sur Pull Requests.
# ──────────────────────────────────────────────────────────────
name: SonarCloud Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout complet (fetch-depth=0 requis par SonarCloud pour l'historique des blame)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Installation des dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Tests + couverture de code
      #    Les résultats sont envoyés à SonarCloud via sonar.javascript.lcov.reportPaths
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          # Les secrets sont injectés depuis GitHub Secrets — jamais en dur ici.
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     nethastock_test
          DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          JWT_SECRET:  ${{ secrets.TEST_JWT_SECRET }}

      # 5. Analyse SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Automatique GitHub Actions
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}    # À créer dans Settings > Secrets
        with:
          args: >
            -Dsonar.projectKey=angelucrece_netb2
            -Dsonar.organization=lucrece
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/test-connection*.js,**/test.js
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true